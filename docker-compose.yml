version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: triple-auth-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=votre_session_secret_ici
      - GMAIL_USER=utilisateur@gmail.com
      - GMAIL_PASS=votre_mot_de_passe_app
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/serviceAccount.json
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      - ./backend/serviceAccount.json:/app/serviceAccount.json:ro
    networks:
      - triple-auth-network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: triple-auth-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - triple-auth-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Reverse proxy (optionnel)
  nginx:
    image: nginx:alpine
    container_name: triple-auth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - triple-auth-network
    restart: unless-stopped
    profiles:
      - production

networks:
  triple-auth-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  firebase-logs:
    driver: local
